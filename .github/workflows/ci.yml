name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install

      - name: Biome
        run: bun run lint

      - name: Web tests
        run: bun run test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: API tests
        run: bun run test:api

  lighthouse:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install

      - name: Build web
        run: bun run build

      # Thresholds are warn-only in lighthouserc.json (score >= 0.8).
      # Tighten to "error" once mobile preset + perf budget are stable.
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
