services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: fifteenmenit
      POSTGRES_PASSWORD: fifteenmenit
      POSTGRES_DB: fifteenmenit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fifteenmenit -d fifteenmenit"]
      interval: 5s
      timeout: 5s
      retries: 5

  valhalla:
    build:
      context: ./services/valhalla
      dockerfile: Dockerfile
    profiles: ["routing"]
    ports:
      - "8002:8002"
    volumes:
      - ./data/valhalla:/custom_files
    environment:
      - build_elevation=False
      - serve_tiles=True
      - use_tiles_ignore_pbf=True
      - build_tar=True

volumes:
  pgdata:
